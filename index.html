<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>Deferred Splat+Mesh Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #stats {
      position: fixed;
      top: 8px;
      left: 8px;
      right: 210px;
      color: #0f0;
      font: 13px/1.4 monospace;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
      overflow-wrap: anywhere;
    }
    #postprocess-controls {
      position: fixed;
      right: 8px;
      top: 8px;
      z-index: 20;
      color: #e8eef6;
      font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: rgba(8, 10, 14, 0.78);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 6px;
      min-width: 188px;
      max-width: min(260px, calc(100vw - 16px));
      backdrop-filter: blur(6px);
    }
    #postprocess-controls summary {
      cursor: pointer;
      list-style: none;
      padding: 7px 10px;
      font-weight: 650;
      user-select: none;
    }
    #postprocess-controls summary::-webkit-details-marker { display: none; }
    #postprocess-controls summary::after {
      content: "v";
      float: right;
      opacity: 0.72;
    }
    #postprocess-controls details:not([open]) summary::after { content: ">"; }
    #postprocess-controls .postprocess-panel {
      display: grid;
      gap: 7px;
      padding: 0 10px 10px;
    }
    #postprocess-controls label {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 24px;
    }
    #postprocess-controls input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    #postprocess-controls select,
    #postprocess-controls input[type="range"] {
      width: 92px;
    }
    #postprocess-sharpness-value,
    #postprocess-dof-focus-value,
    #postprocess-dof-strength-value {
      min-width: 3.5ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    @media (max-width: 720px) {
      #stats {
        top: 48px;
        right: 8px;
      }
      #postprocess-controls {
        min-width: 174px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="stats"></div>
  <div id="postprocess-controls" data-visual-smoke-ignore>
    <details>
      <summary>Post FX</summary>
      <div class="postprocess-panel">
        <label for="postprocess-enabled">
          <span>Enabled</span>
          <input id="postprocess-enabled" type="checkbox" checked />
        </label>
        <label for="postprocess-fxaa-enabled">
          <span>FXAA</span>
          <input id="postprocess-fxaa-enabled" type="checkbox" checked />
        </label>
        <label for="postprocess-cas-enabled">
          <span>CAS</span>
          <input id="postprocess-cas-enabled" type="checkbox" checked />
        </label>
        <label for="postprocess-samples">
          <span>Samples</span>
          <select id="postprocess-samples">
            <option value="4">4</option>
            <option value="8" selected>8</option>
            <option value="12">12</option>
          </select>
        </label>
        <label for="postprocess-radius">
          <span>Radius</span>
          <select id="postprocess-radius">
            <option value="1">1 px</option>
            <option value="2" selected>2 px</option>
            <option value="3">3 px</option>
            <option value="4">4 px</option>
          </select>
        </label>
        <label for="postprocess-sharpness">
          <span>Sharp</span>
          <span>
            <input id="postprocess-sharpness" type="range" min="0" max="100" step="1" value="35" />
            <output id="postprocess-sharpness-value" for="postprocess-sharpness">35%</output>
          </span>
        </label>
        <label for="postprocess-dof-enabled">
          <span>DOF</span>
          <input id="postprocess-dof-enabled" type="checkbox" />
        </label>
        <label for="postprocess-dof-focus">
          <span>Focus</span>
          <span>
            <input id="postprocess-dof-focus" type="range" min="0" max="100" step="1" value="80" />
            <output id="postprocess-dof-focus-value" for="postprocess-dof-focus">80%</output>
          </span>
        </label>
        <label for="postprocess-dof-strength">
          <span>Aperture</span>
          <span>
            <input id="postprocess-dof-strength" type="range" min="0" max="100" step="1" value="35" />
            <output id="postprocess-dof-strength-value" for="postprocess-dof-strength">35%</output>
          </span>
        </label>
        <label for="postprocess-dof-radius">
          <span>Blur R</span>
          <select id="postprocess-dof-radius">
            <option value="2">2 px</option>
            <option value="4" selected>4 px</option>
            <option value="6">6 px</option>
            <option value="8">8 px</option>
          </select>
        </label>
        <label for="postprocess-debug-view">
          <span>View</span>
          <select id="postprocess-debug-view">
            <option value="final" selected>Final</option>
            <option value="fxaa-mask">FXAA mask</option>
            <option value="cas-mask">CAS mask</option>
            <option value="difference">Difference</option>
            <option value="depth">Depth</option>
            <option value="confidence">Confidence</option>
            <option value="dof-mask">DOF mask</option>
          </select>
        </label>
        <label for="postprocess-temporal-mode">
          <span>Temporal</span>
          <select id="postprocess-temporal-mode">
            <option value="off">Off</option>
            <option value="idle" selected>Idle</option>
            <option value="always">Always</option>
          </select>
        </label>
        <label for="postprocess-temporal-frames">
          <span>T Frames</span>
          <select id="postprocess-temporal-frames">
            <option value="2">2</option>
            <option value="4">4</option>
            <option value="8" selected>8</option>
            <option value="16">16</option>
          </select>
        </label>
        <label for="postprocess-temporal-view">
          <span>T View</span>
          <select id="postprocess-temporal-view">
            <option value="final" selected>Final</option>
            <option value="history-weight">History</option>
            <option value="difference">Difference</option>
          </select>
        </label>
      </div>
    </details>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
